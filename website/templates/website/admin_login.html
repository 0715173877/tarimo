<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalton Investment · Admin Login</title>
  <!-- Bootstrap 5.3 + icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Font: Inter (same as main site) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #1a2942 0%, #0a1120 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }
    /* geometric background shapes (same as main site) */
    .shape-1 {
      position: absolute;
      top: 0;
      right: 0;
      width: 40%;
      height: 70%;
      background: linear-gradient(135deg, #f5b34220 0%, #0f6cbf20 100%);
      clip-path: polygon(100% 0, 0% 100%, 100% 100%);
      z-index: 0;
    }
    .shape-2 {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle at 0% 100%, #f5b34230, transparent 70%);
      z-index: 0;
    }
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .logo-image {
      width: 60px;
      height: 60px;
      filter: brightness(1.2);
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 2rem;
      line-height: 1.2;
      color: #f5b342;
      text-transform: uppercase;
    }
    .logo-text span {
      color: white;
      font-weight: 300;
      font-size: 1rem;
      display: block;
      letter-spacing: 2px;
    }
    .welcome-text {
      color: #eef4ff;
      text-align: center;
      margin-bottom: 2rem;
    }
    .welcome-text h2 {
      font-weight: 600;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .welcome-text p {
      color: #b0c8e5;
      font-size: 0.95rem;
    }
    .form-floating {
      margin-bottom: 1.2rem;
    }
    .form-floating > .form-control {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(245, 180, 66, 0.3);
      color: #eef4ff;
      border-radius: 1rem;
      height: 60px;
      padding: 1rem 1.25rem;
    }
    .form-floating > .form-control:focus {
      background: rgba(255, 255, 255, 0.05);
      border-color: #f5b342;
      box-shadow: 0 0 0 0.25rem rgba(245, 180, 66, 0.2);
    }
    .form-floating > .form-control::placeholder {
      color: #9aa9c1;
    }
    .form-floating > label {
      color: #b0c8e5;
      padding: 1rem 1.25rem;
    }
    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label {
      color: #f5b342;
      transform: scale(0.85) translateY(-0.8rem) translateX(0.15rem);
    }
    .input-icon {
      position: relative;
    }
    .input-icon i {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #f5b342;
      font-size: 1.3rem;
      z-index: 20;
      pointer-events: none;
    }
    .form-check {
      margin: 1.5rem 0;
    }
    .form-check-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #f5b34240;
      cursor: pointer;
    }
    .form-check-input:checked {
      background-color: #f5b342;
      border-color: #f5b342;
    }
    .form-check-label {
      color: #b0c8e5;
    }
    .btn-login {
      background: #f5b342;
      color: #0b1423;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      padding: 0.8rem;
      width: 100%;
      font-size: 1.2rem;
      transition: all 0.2s;
      box-shadow: 0 10px 20px -8px #f5b34260;
      margin-bottom: 1.5rem;
    }
    .btn-login:hover {
      background: #ffc55a;
      transform: scale(1.02);
      color: #0b1423;
      box-shadow: 0 15px 25px -8px #f5b342;
    }
    .forgot-link {
      text-align: center;
    }
    .forgot-link a {
      color: #b0c8e5;
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
    }
    .forgot-link a:hover {
      color: #f5b342;
    }
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2rem;
      color: #9aa9c1;
      font-size: 0.85rem;
    }
    .security-badge i {
      color: #f5b342;
    }
    .back-to-site {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 30;
      color: #eef4ff;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(5px);
      padding: 0.6rem 1.5rem;
      border-radius: 50px;
      border: 1px solid rgba(245, 180, 66, 0.3);
      transition: all 0.2s;
    }
    .back-to-site:hover {
      background: #f5b342;
      color: #0b1423;
      border-color: #f5b342;
    }
    .back-to-site i {
      margin-right: 8px;
    }
    /* input autofill styles */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-background-clip: text;
      -webkit-text-fill-color: #eef4ff;
      transition: background-color 5000s ease-in-out 0s;
      box-shadow: inset 0 0 20px 20px rgba(255, 255, 255, 0.03);
    }
  </style>
</head>
<body>
  <!-- geometric shapes -->
  <div class="shape-1"></div>
  <div class="shape-2"></div>

  <!-- back to main site link -->
  <a href="../index.html" class="back-to-site text-decoration-none">
    <i class="bi bi-arrow-left"></i> <span data-en="Back to Site" data-sw="Rudi kwenye Tovuti">Back to Site</span>
  </a>

  <!-- login container -->
  <div class="login-container">
    <div class="glass-card">
      <!-- logo -->
      <div class="logo-area">
        <img src="../logo/fwdkaltonlogofiles/K I.png" alt="Kalton" class="logo-image">
        <div class="logo-text">
          KalTon<br>
          <span data-en="ADMIN PANEL" data-sw="JUKWAA LA USIMAMIZI">ADMIN PANEL</span>
        </div>
      </div>

      <!-- welcome text (bilingual) -->
      <div class="welcome-text">
        <h2 data-en="Welcome Back" data-sw="Karibu Tena">Welcome Back</h2>
        <p data-en="Sign in to manage your website content" data-sw="Ingia ili kudhibiti maudhui ya tovuti yako">Sign in to manage your website content</p>
      </div>
      {% if not success %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>Error!</strong> {{ error }}.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endif %}

      <!-- login form -->
      <form action="{% url 'website:admin_login' %}" method="post" id="loginForm">
        {% csrf_token %}
        <!-- username / email field -->
        <div class="form-floating input-icon">
          <input type="email" name="username" class="form-control" id="floatingInput" placeholder="name@example.com" required>
          <label for="floatingInput" data-en="Email address" data-sw="Barua pepe">Email address</label>
          <i class="bi bi-envelope-fill"></i>
        </div>

        <!-- password field -->
        <div class="form-floating input-icon">
          <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
          <label for="floatingPassword" data-en="Password" data-sw="Nywila">Password</label>
          <i class="bi bi-lock-fill"></i>
        </div>

        <!-- remember me & forgot password -->
        <div class="d-flex justify-content-between align-items-center form-check">
          <div>
            <input class="form-check-input" type="checkbox" id="rememberCheck">
            <label class="form-check-label" for="rememberCheck" data-en="Remember me" data-sw="Nikumbuke">Remember me</label>
          </div>
          <!-- <div class="forgot-link">
            <a href="#" data-en="Forgot password?" data-sw="Nime sahau nywila?">Forgot password?</a>
          </div> -->
        </div>

        <!-- login button -->
        <button type="submit" class="btn btn-login" id="loginBtn">
          <span data-en="Sign In" data-sw="Ingia">Sign In</span>
        </button>

        <!-- demo credentials hint (for testing, can be removed in production) -->
        <!-- <div class="text-center small text-white-50" style="color: #b0c8e5 !important;">
          <i class="bi bi-info-circle me-1"></i> <span data-en="Demo: admin@kalton.co.tz / admin123" data-sw="Onyesho: admin@kalton.co.tz / admin123">Demo: admin@kalton.co.tz / admin123</span>
        </div> -->

        <!-- security badge -->
        <div class="security-badge">
          <i class="bi bi-shield-lock-fill"></i>
          <span data-en="Secured by Kalton Investment" data-sw="Imelindwa na Kalton Investment">Secured by Kalton Investment</span>
          <i class="bi bi-shield-lock-fill"></i>
        </div>
      </form>
    </div>
  </div>

  <!-- language switcher (small, at bottom right) -->
  <div style="position: fixed; bottom: 20px; right: 20px; z-index: 100;">
    <div class="btn-group" role="group">
      <button type="button" class="btn btn-outline-gold btn-sm lang-switch" data-lang="en" style="border: 1px solid #f5b342; color: #f5b342; background: rgba(10,20,35,0.8);">EN</button>
      <button type="button" class="btn btn-outline-gold btn-sm lang-switch" data-lang="sw" style="border: 1px solid #f5b342; color: #f5b342; background: rgba(10,20,35,0.8);">SW</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Simple bilingual functionality for login page
    document.addEventListener('DOMContentLoaded', function() {
      // Language switching
      const langButtons = document.querySelectorAll('.lang-switch');
      
      // Function to set language
      const setLanguage = (lang) => {
        document.querySelectorAll('[data-en]').forEach(el => {
          if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
            // For placeholders we don't have here, but keep for consistency
            if (el.placeholder && el.dataset[lang]) {
              el.placeholder = el.dataset[lang];
            }
          } else {
            // For regular elements (spans, divs, labels, etc.)
            if (el.dataset[lang]) {
              el.innerHTML = el.dataset[lang];
            }
          }
        });

        // Update button active states
        langButtons.forEach(btn => {
          if (btn.dataset.lang === lang) {
            btn.classList.add('btn-gold');
            btn.classList.remove('btn-outline-gold');
          } else {
            btn.classList.remove('btn-gold');
            btn.classList.add('btn-outline-gold');
          }
        });
      };

      // Add click handlers
      langButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          setLanguage(btn.dataset.lang);
        });
      });

      // Set default language to English
      setLanguage('en');

      // Simple login form validation (demo only)
    //   const loginForm = document.getElementById('loginForm');
    //   if (loginForm) {
    //     loginForm.addEventListener('submit', function(e) {
    //       e.preventDefault();
          
    //       const email = document.getElementById('floatingInput').value;
    //       const password = document.getElementById('floatingPassword').value;
          
    //       // Demo credentials check (for demonstration only)
    //       if (email === 'admin@kalton.co.tz' && password === 'admin123') {
    //         // Redirect to admin panel (in real implementation)
    //         alert('Login successful! Redirecting to admin panel...');
    //         window.location.href = 'admin-panel.html'; // would be your actual admin page
    //       } else {
    //         alert('Invalid credentials. Use demo: admin@kalton.co.tz / admin123');
    //       }
    //     });
    //   }
    });
  </script>

  <!-- extra styles for language switcher -->
  <style>
    .btn-outline-gold {
      border: 2px solid #f5b342;
      color: #f5b342;
      background: transparent;
    }
    .btn-outline-gold:hover {
      background: #f5b342;
      color: #0b1423;
    }
    .btn-gold {
      background: #f5b342;
      color: #0b1423;
      border: 2px solid #f5b342;
    }
    .btn-gold:hover {
      background: #ffc55a;
      color: #0b1423;
    }
    .text-white-50 {
      color: rgba(255,255,255,0.5) !important;
    }
  </style>
</body>
</html>
